name: Daily Spanish Reminder

on:
  schedule:
    # 8:00 AM Pacific Daylight Time (UTC-7) = 15:00 UTC
    - cron: '0 15 * * *'
    # 8:00 PM Pacific Daylight Time (UTC-7) = 03:00 UTC (next UTC day)
    - cron: '0 3 * * *'

  # Allow manual runs from the Actions tab (useful for testing)
  workflow_dispatch:
    inputs:
      time_of_day:
        description: 'Which message to send'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - evening

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Determine morning vs evening from which cron fired.
      # workflow_dispatch uses the explicit input instead.
      - name: Resolve time of day
        id: tod
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "time=${{ inputs.time_of_day }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 15 * * *" ]; then
            echo "time=morning" >> "$GITHUB_OUTPUT"
          else
            echo "time=evening" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node send-message.js ${{ steps.tod.outputs.time }}
